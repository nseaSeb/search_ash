name: CI

on:
  push:
    # Not tags: a release tag points at a commit already on main, so it was tested by the
    # branch push above — triggering again on the tag would just run the same commit twice.
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      # The test suite reads its connection from these (see config/config.exs); they point at
      # the Postgres service above, and test_helper.exs creates the database itself.
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: search_ash_test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test

  # The example is a separate mix project (own deps + formatter config) and the root job's
  # `mix format` only covers config/lib/test, so example scripts could drift out of format
  # unnoticed. It depends on search_core as a sibling path, so check it out alongside; format
  # only needs deps *fetched* (for import_deps), not compiled, so no Postgres and no test run.
  format-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: search_ash

      - uses: actions/checkout@v4
        with:
          repository: nseaSeb/search_core
          path: search_core

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache example deps
        uses: actions/cache@v4
        with:
          path: |
            search_ash/examples/search_demo/deps
            search_ash/examples/search_demo/_build
          key: ${{ runner.os }}-example-${{ hashFiles('search_ash/examples/search_demo/mix.lock') }}
          restore-keys: ${{ runner.os }}-example-

      - name: Check example formatting
        working-directory: search_ash/examples/search_demo
        run: |
          mix deps.get
          mix format --check-formatted
